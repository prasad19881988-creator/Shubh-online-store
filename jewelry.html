<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUBH ONLINE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 30px; border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel'; font-size: 1.8rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .tagline { color: #fcf6ba; font-style: italic; font-size: 0.85rem; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(191,149,63,0.3); border-radius: 10px; overflow: hidden; padding-bottom: 25px; transition: 0.5s; }
        .card:hover { border-color: #bf953f; transform: translateY(-10px); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-bottom: 1px solid rgba(191,149,63,0.1); }
        .info { padding: 15px; }
        .desc { font-size: 0.85rem; color: #bbb; margin-bottom: 15px; min-height: 50px; line-height: 1.4; }
        .price { font-size: 1.6rem; color: #fcf6ba; font-weight: bold; margin-bottom: 15px; }
        .wa-btn { border: 1px solid #25D366; color: #25D366; padding: 10px 20px; text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SHUBH JEWELRY ONLINE STORE</div>
        <div class="tagline">Aapka vishwas hamari pehchan, aapki khushi hamara samman.</div>
    </header>
    
    <div class="grid" id="jewelry-grid">
        <script>
            const grid = document.getElementById('jewelry-grid');
            // Professional Designs ki list
            const items = [
                {n: "Royal Gold Choker", d: "Shuddh 22K gold finish wala choker set jo har dulhan ki pehli pasand hai. Isme meenakari ka barik kaam kiya gaya hai."},
                {n: "Diamond Studded Earrings", d: "Premium American Diamond se bane party wear earrings jo aapko har mehfil mein alag chamak denge."},
                {n: "Antique Temple Necklace", d: "South Indian Temple design necklace jo shuddh sunehre rang aur barik karigari ke saath aata hai."},
                {n: "Bridal Kundan Set", d: "Bhari Kundan aur Moti ka kaam wala poora bridal set. Isme matching maang-tika aur jhumke shamil hain."},
                {n: "Classic Gold Bangles", d: "Rozana pehenne ke liye mazboot aur sundar design wali chudiyan. Inka rang kabhi fika nahi padta."},
                {n: "Ruby Floral Pendant", d: "Asli Ruby pathar aur floral design wala sunehra pendant set. Sadi aur suit dono par suit karega."},
                {n: "Designer Silver Payal", d: "Shuddh chandi jaisa look dene wali designer payal jo pairo ki sundarta ko char chand laga degi."}
            ];

            // 50 products ka loop
            for(let i=1; i<=50; i++) {
                let itm = items[(i-1) % items.length];
                grid.innerHTML += `
                <div class="card">
                    <img src="j${i}.jpg" alt="Design ${i}">
                    <div class="info">
                        <h3>${itm.n} #${i}</h3>
                        <p class="desc">${itm.d}</p>
                        <p class="price">₹1,499</p>
                        <a href="https://wa.me/917360025302?text=Order: Shubh Jewelry j${i}" class="wa-btn">Order Now</a>
                    </div>
                </div>`;
            }
        </script>
    </div>

    <footer style="padding: 40px; color: #666; font-size: 0.8rem; border-top: 1px solid #222;">
        <p><strong>SHUBH ONLINE STORE</strong></p>
        <p>Dharampur, Laxmisagar, Darbhanga, Bihar - 846009</p>
        <p>&copy; 2026 Managed by Sachchidanand</p>
    </footer>
</body>
</html>
