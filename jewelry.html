<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Jewelry | Shubh Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 30px; border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel'; font-size: 2.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(191,149,63,0.2); border-radius: 8px; overflow: hidden; padding-bottom: 25px; transition: 0.5s; }
        .card:hover { border-color: #bf953f; transform: translateY(-10px); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-bottom: 1px solid rgba(191,149,63,0.1); }
        .info { padding: 15px; }
        .desc { font-size: 0.85rem; color: #bbb; margin-bottom: 15px; min-height: 50px; line-height: 1.4; }
        .price { font-size: 1.6rem; color: #fcf6ba; font-weight: bold; margin-bottom: 15px; }
        .wa-btn { border: 1px solid #25D366; color: #25D366; padding: 10px 20px; text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; border-radius: 2px; }
        .wa-btn:hover { background: #25D366; color: #000; }
    </style>
</head>
<body>
    <header><div class="logo">SHUBH JEWELRY</div></header>
    <div class="grid">
        <div class="card">
            <img src="j1.jpg">
            <div class="info">
                <h3>Royal Gold Necklace</h3>
                <p class="desc">Shuddh karigari se bana handmade set jo har mauke par aapki shaan badhaye.</p>
                <p class="price">₹1,499</p>
                <a href="https://wa.me/917360025302?text=Order: Jewelry j1" class="wa-btn">Order on WhatsApp</a>
            </div>
        </div>
        <div class="card">
            <img src="j2.jpg">
            <div class="info">
                <h3>Bridal Special Jhumka</h3>
                <p class="desc">Classic Indian design jo halka hai aur pehenne mein ekdum aaramdayak.</p>
                <p class="price">₹799</p>
                <a href="https://wa.me/917360025302?text=Order: Jewelry j2" class="wa-btn">Order on WhatsApp</a>
            </div>
        </div>
        </div>
</body>
</html>
