<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUBH ONLINE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 30px; border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel'; font-size: 1.8rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .tagline { color: #fcf6ba; font-style: italic; font-size: 0.85rem; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(191,149,63,0.3); border-radius: 10px; overflow: hidden; padding-bottom: 25px; transition: 0.5s; }
        .card:hover { border-color: #bf953f; transform: translateY(-10px); }
        .card img { width: 100%; height: 280px; object-fit: contain; background: #111; padding: 10px; }
        .info { padding: 15px; }
        .desc { font-size: 0.85rem; color: #bbb; margin-bottom: 15px; min-height: 50px; line-height: 1.4; }
        .price { font-size: 1.6rem; color: #fcf6ba; font-weight: bold; margin-bottom: 15px; }
        .wa-btn { border: 1px solid #25D366; color: #25D366; padding: 10px 20px; text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SHUBH ACCESSORIES ONLINE STORE</div>
        <div class="tagline">Aapka vishwas hamari pehchan, aapki khushi hamara samman.</div>
    </header>
    
    <div class="grid" id="accessories-grid">
        <script>
            const grid = document.getElementById('accessories-grid');
            // Alag-alag products ki list
            const items = [
                {n: "Ultra Fast Charger", d: "65W super fast charging support ke saath. Aapke phone ke liye surakshit aur mazboot."},
                {n: "Premium Silicon Case", d: "Soft touch finish aur shockproof safety. Phone ko girne se bachaye aur naya rakhe."},
                {n: "9H Tempered Glass", d: "Crystal clear visibility aur scratch resistance screen safety ke liye sabse best."},
                {n: "Braided Data Cable", d: "Tangle-free aur high-speed data transfer support. Long lasting aur heavy duty."},
                {n: "Magnetic Car Mount", d: "Driving ke waqt phone ko safe rakhne ke liye mazboot magnetic grip stand."}
            ];

            // Ye loop apne aap 50 items bana dega
            for(let i=1; i<=50; i++) {
                let item = items[(i-1) % items.length]; // Items repeat honge par numbering alag hogi
                grid.innerHTML += `
                <div class="card">
                    <img src="m${i}.jpg">
                    <div class="info">
                        <h3>${item.n} #${i}</h3>
                        <p class="desc">${item.d}</p>
                        <p class="price">₹499</p>
                        <a href="https://wa.me/917360025302?text=Order: Shubh Accessories m${i}" class="wa-btn">Order Now</a>
                    </div>
                </div>`;
            }
        </script>
    </div>
    <footer style="padding: 40px; color: #666; font-size: 0.8rem;">&copy; 2026 Shubh Online Store | Managed by Munna Kumar</footer>
</body>
</html>
