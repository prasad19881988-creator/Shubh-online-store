<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUBH ELECTRONICS - EMI AVAILABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 30px; border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel'; font-size: 1.8rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(191,149,63,0.3); border-radius: 10px; overflow: hidden; padding-bottom: 25px; transition: 0.5s; position: relative; }
        .emi-badge { background: #ffea00; color: #000; font-size: 0.7rem; font-weight: bold; padding: 3px 10px; position: absolute; top: 10px; right: 10px; border-radius: 5px; }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .info { padding: 15px; }
        .price { font-size: 1.4rem; color: #fcf6ba; font-weight: bold; margin-bottom: 5px; }
        .emi-text { color: #25D366; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; }
        .wa-btn { border: 1px solid #25D366; color: #25D366; padding: 10px 20px; text-decoration: none; font-size: 0.8rem; font-weight: bold; border-radius: 4px; }
        .emi-footer { background: rgba(255,255,255,0.05); padding: 20px; margin: 20px 5%; border-radius: 10px; border: 1px dashed #bf953f; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" style="height: 100px; margin-bottom: 10px; border-radius: 50%;">
        <div class="logo">SHUBH ELECTRONICS STORE</div>
    </header>

    <div class="grid" id="electronics-grid">
        <script>
            const grid = document.getElementById('electronics-grid');
            const items = [
                {n: "Smart LED TV 32\"", d: "Android Smart TV with voice remote.", p: "₹12,499", emi: "₹599"},
                {n: "Single Door Refrigerator", d: "190L Capacity, Fast Ice Making.", p: "₹14,990", emi: "₹749"},
                {n: "Washing Machine 7kg", d: "Powerful wash with turbo dryer.", p: "₹9,990", emi: "₹499"},
                {n: "Split AC 1.5 Ton", d: "Inverter cooling, 5-star saving.", p: "₹32,000", emi: "₹1,499"},
                {n: "Microwave Oven 20L", d: "Best for baking and grilling.", p: "₹6,499", emi: "₹349"}
                // Aise hi baki 50 items ka data yahan aayega...
            ];

            // For demo, 50 items repeat with index
            for(let i=1; i<=50; i++) {
                let itm = items[(i-1) % items.length];
                grid.innerHTML += `
                <div class="card">
                    <div class="emi-badge">Bajaj EMI Card Ok</div>
                    <img src="e${i}.jpg" alt="${itm.n}">
                    <div class="info">
                        <h3>${itm.n}</h3>
                        <p style="color:#bbb; font-size:0.8rem;">${itm.d}</p>
                        <p class="price">${itm.p}</p>
                        <p class="emi-text">EMI starts at ${itm.emi}/month*</p>
                        <a href="https://wa.me/917360025302?text=Order: e${i} ${itm.n} with EMI" class="wa-btn">Buy on WhatsApp</a>
                    </div>
                </div>`;
            }
        </script>
    </div>

    <div class="emi-footer">
        <h4 style="color: #fcf6ba; margin-bottom: 10px;">💳 No Cost EMI & Easy Finance</h4>
        <p style="font-size: 0.8rem; color: #ddd;">Bajaj Finserv | HDFC Bank | ICICI | SBI | All Major Credit Cards</p>
        <p style="font-size: 0.7rem; color: #888;">*Minimum document required for Bajaj Finance. Approval in 5 mins.</p>
    </div>

    <footer style="padding: 30px; color: #555; font-size: 0.8rem;">
        Dharampur, Laxmisagar, Darbhanga, Bihar - 846009
    </footer>
</body>
</html>
