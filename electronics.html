<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUBH ONLINE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 30px; border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel'; font-size: 1.8rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .tagline { color: #fcf6ba; font-style: italic; font-size: 0.85rem; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(191,149,63,0.3); border-radius: 10px; overflow: hidden; padding-bottom: 25px; }
        .card img { width: 100%; height: 280px; object-fit: contain; background: #111; padding: 10px; }
        .price { font-size: 1.6rem; color: #fcf6ba; font-weight: bold; margin-bottom: 15px; }
        .wa-btn { border: 1px solid #25D366; color: #25D366; padding: 10px 20px; text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
    <img src="logo.png" alt="Logo" style="height: 120px; margin-bottom: 10px; border-radius: 50%;">
    
    <div class="logo">SHUBH ONLINE STORE</div>
    <div class="tagline">Aapka vishwas hamari pehchan, aapki khushi hamara samman.</div>
</header>
    <div class="grid" id="electronics-grid">
        <script>
            const eGrid = document.getElementById('electronics-grid');
            const items = [
                {n: "Wireless Earbuds Pro", d: "Crystal clear sound aur deep bass. 24 ghante tak ka battery backup."},
                {n: "Smart Fitness Watch", d: "Health tracking, calls aur notifications ke saath premium stylish look."},
                {n: "Portable Bluetooth Speaker", d: "Chhota packet bada dhamaka! Waterproof aur heavy sound quality."},
                {n: "10000mAh Power Bank", d: "Fast charging aur slim design. Safar mein aapka sacha saathi."},
                {n: "Noise Cancelling Headphones", d: "Studio quality sound aur noise isolation music lovers ke liye."}
            ];
            for(let i=1; i<=50; i++) {
                let itm = items[(i-1) % items.length];
                eGrid.innerHTML += `
                <div class="card">
                    <img src="e${i}.jpg">
                    <div class="info">
                        <h3>${itm.n} #${i}</h3>
                        <p style="font-size:0.85rem; color:#bbb; padding:10px; line-height:1.4;">${itm.d}</p>
                        <p class="price">₹999</p>
                        <a href="https://wa.me/917360025302?text=Order: Electronics e${i}" class="wa-btn">Order Now</a>
                    </div>
                </div>`;
            }
        </script>
    </div>
    <footer style="padding: 40px; color: #666; font-size: 0.8rem;">&copy; 2026 Shubh Online Store | Managed by Munna Kumar</footer>
</body>
</html>
