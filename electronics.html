<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Electronics | Shubh Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --dark: #0a0a0a; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 30px; border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel'; font-size: 2.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(191, 149, 63, 0.2); border-radius: 5px; overflow: hidden; padding-bottom: 25px; transition: 0.5s; }
        .card:hover { border-color: #bf953f; transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        .card img { width: 100%; height: 280px; object-fit: contain; background: #111; padding: 10px; }
        .price { font-size: 1.6rem; color: #fcf6ba; margin: 15px 0; font-weight: bold; }
        .wa-btn { border: 1px solid #25D366; color: #25D366; padding: 10px 20px; text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .wa-btn:hover { background: #25D366; color: #000; }
    </style>
</head>
<body>
    <header><div class="logo">SHUBH ELECTRONICS</div></header>
    <div class="grid">
        
        <div class="card">
            <img src="e1.jpg"><h3>Smart Gadget #1</h3><p class="price">₹999</p>
            <a href="https://wa.me/917360025302?text=Order: Electronics e1" class="wa-btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="e2.jpg"><h3>Smart Gadget #2</h3><p class="price">₹999</p>
            <a href="https://wa.me/917360025302?text=Order: Electronics e2" class="wa-btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="e3.jpg"><h3>Smart Gadget #3</h3><p class="price">₹999</p>
            <a href="https://wa.me/917360025302?text=Order: Electronics e3" class="wa-btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="e4.jpg"><h3>Smart Gadget #4</h3><p class="price">₹999</p>
            <a href="https://wa.me/917360025302?text=Order: Electronics e4" class="wa-btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="e5.jpg"><h3>Smart Gadget #5</h3><p class="price">₹999</p>
            <a href="https://wa.me/917360025302?text=Order: Electronics e5" class="wa-btn">Order on WhatsApp</a>
        </div>

    </div>
    <footer style="padding: 40px; color: #666; font-size: 0.8rem;">&copy; 2026 Shubh Luxury Store | Managed by Sachchidanand</footer>
</body>
</html>
