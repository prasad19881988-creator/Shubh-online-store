<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUBH ONLINE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        header { background: #0f0f0f; padding: 40px 20px; border-bottom: 2px solid #bf953f; }
        .logo { font-family: 'Cinzel'; font-size: 2.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .tagline { color: #fcf6ba; font-style: italic; font-size: 1rem; margin-top: 10px; letter-spacing: 1px; }
        nav { background: #1a1a1a; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        nav a { color: #fcf6ba; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        .hero { padding: 100px 20px; background: radial-gradient(circle, #1a1a1a, #000); }
        .shop-btn { border: 1px solid #bf953f; color: #bf953f; padding: 15px 35px; text-decoration: none; display: inline-block; margin-top: 30px; font-weight: bold; border-radius: 2px; transition: 0.3s; }
        .shop-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SHUBH ONLINE STORE</div>
        <div class="tagline">Aapka vishwas hamari pehchan, aapki khushi hamara samman.</div>
    </header>
    
    <nav>
        <a href="index.html">Home</a>
        <a href="jewelry.html">Jewelry</a>
        <a href="electronics.html">Electronics</a>
        <a href="accessories.html">Accessories</a>
    </nav>

    <div class="hero">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Swagat Hai!</h1>
        <p style="color: #888;">India's Premium Online Shopping Destination</p>
        <a href="jewelry.html" class="shop-btn">BROWSE COLLECTIONS</a>
    </div>

    <footer style="padding: 50px; color: #555; font-size: 0.8rem; border-top: 1px solid #222;">
        &copy; 2026 SHUBH ONLINE STORE | Managed by Sachchidanand
    </footer>
</body>
</html>
