<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubh Luxury Store | Sachchidanand</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --dark: #0f0f0f; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; overflow-x: hidden; }
        
        /* Premium Header with Animation */
        header { background: var(--dark); padding: 40px 20px; text-align: center; border-bottom: 2px solid #bf953f; }
        .logo { font-family: 'Cinzel', serif; font-size: 3rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: 5px; }
        
        /* Interactive Nav */
        nav { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fcf6ba; text-decoration: none; margin: 0 15px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.5s; }
        nav a:hover { text-shadow: 0 0 10px #fcf6ba; }

        /* Luxury Banner */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #2c3e50 0%, #000 100%); }
        .hero h2 { font-family: 'Cinzel'; font-size: 2rem; margin-bottom: 10px; color: #fff; }
        .hero p { color: #bf953f; font-style: italic; letter-spacing: 1px; }

        /* Grid for Products */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; }
        
        /* Glass Card Effect */
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; transition: 0.6s; position: relative; }
        .card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.08); border: 1px solid #bf953f; }
        .card img { width: 100%; height: 300px; object-fit: cover; filter: grayscale(30%); transition: 0.5s; }
        .card:hover img { filter: grayscale(0%); }
        
        .info { padding: 25px; text-align: center; }
        .price { font-size: 1.6rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        
        /* WhatsApp Button */
        .btn-wa { margin-top: 20px; padding: 12px 25px; border: 1px solid #bf953f; color: #bf953f; text-decoration: none; display: inline-block; transition: 0.4s; border-radius: 2px; text-transform: uppercase; font-size: 0.8rem; }
        .btn-wa:hover { background: var(--gold); color: #000; font-weight: bold; }

        footer { border-top: 1px solid #333; padding: 50px 20px; text-align: center; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">SHUBH</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="jewelry.html">Jewelry</a>
    <a href="electronics.html">Tech</a>
</nav>

<div class="hero">
    <h2>ELEGANCE IN EVERY PIECE</h2>
    <p>Sachchidanand's Exclusive Collection</p>
</div>

<div class="container">
    <div class="card">
        <img src="j1.jpg" alt="Luxury Necklace">
        <div class="info">
            <h3>Handmade Royal Set</h3>
            <div class="price">₹1,499</div>
            <a href="https://wa.me/917360025302?text=Order: Royal Set" class="btn-wa">Order via WhatsApp</a>
        </div>
    </div>
    <div class="card">
        <img src="e1.jpg" alt="Premium Tech">
        <div class="info">
            <h3>Elite Buds Pro</h3>
            <div class="price">₹1,999</div>
            <a href="https://wa.me/917360025302?text=Order: Elite Buds" class="btn-wa">Order via WhatsApp</a>
        </div>
    </div>
</div>

<footer>
    <p>SHUBH ONLINE STORE &copy; 2026</p>
    <p style="color: #bf953f; margin-top: 10px;">Managed by Sachchidanand</p>
</footer>

</body>
</html>
