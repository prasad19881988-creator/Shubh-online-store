<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubh Luxury Store | Sachchidanand</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --dark: #0f0f0f; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; overflow-x: hidden; }
        
        /* Premium Header */
        header { background: var(--dark); padding: 40px 20px; text-align: center; border-bottom: 2px solid #bf953f; }
        .logo { font-family: 'Cinzel', serif; font-size: 3.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: 5px; text-shadow: 2px 2px 10px rgba(191, 149, 63, 0.3); }
        
        /* Luxury Navigation Menu */
        nav { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(191, 149, 63, 0.3); }
        nav a { color: #fcf6ba; text-decoration: none; margin: 0 10px; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.5s; font-weight: bold; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px #fcf6ba; }

        /* Luxury Banner */
        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-bottom: 1px solid #222; }
        .hero h2 { font-family: 'Cinzel'; font-size: 1.8rem; margin-bottom: 10px; color: #fff; }
        .hero p { color: #bf953f; font-style: italic; letter-spacing: 1px; margin-bottom: 25px; }
        .btn-gold { padding: 12px 30px; border: 1px solid #bf953f; color: #bf953f; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; transition: 0.4s; }
        .btn-gold:hover { background: var(--gold); color: #000; font-weight: bold; }

        /* Category Section */
        .section-title { font-family: 'Cinzel'; text-align: center; margin-top: 50px; color: #fcf6ba; letter-spacing: 3px; font-size: 1.5rem; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: auto; }
        
        /* Glass Card Effect */
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 5px; overflow: hidden; transition: 0.6s; text-align: center; padding-bottom: 25px; }
        .card:hover { transform: translateY(-10px); border: 1px solid #bf953f; box-shadow: 0 10px 30px rgba(191, 149, 63, 0.1); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-bottom: 1px solid rgba(191, 149, 63, 0.2); }
        
        .info h3 { font-size: 1.1rem; margin: 15px 0 5px; letter-spacing: 1px; }
        .price { font-size: 1.4rem; color: #fcf6ba; font-weight: bold; margin-bottom: 15px; }
        
        /* WhatsApp Button */
        .btn-wa { padding: 10px 20px; background: transparent; border: 1px solid #25D366; color: #25D366; text-decoration: none; border-radius: 2px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .btn-wa:hover { background: #25D366; color: #000; }

        footer { border-top: 1px solid #222; padding: 60px 20px; text-align: center; font-size: 0.7rem; letter-spacing: 2px; color: #666; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">SHUBH</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="jewelry.html">Jewelry</a>
    <a href="accessories.html">Accessories</a>
    <a href="electronics.html">Electronics</a>
</nav>

<div class="hero">
    <h2>PURE ELEGANCE</h2>
    <p>Sachchidanand's Exclusive Premium Collection</p>
    <a href="jewelry.html" class="btn-gold">View Collection</a>
</div>

<div class="section-title">Featured Products</div>

<div class="container">
    <div class="card">
        <img src="j1.jpg" alt="Jewelry">
        <div class="info">
            <h3>Handmade Royal Necklace</h3>
            <div class="price">₹1,499</div>
            <a href="https://wa.me/917360025302?text=Order: Royal Necklace J1" class="btn-wa">Order on WhatsApp</a>
        </div>
    </div>
    
    <div class="card">
        <img src="e1.jpg" alt="Electronics">
        <div class="info">
            <h3>Premium Wireless Buds</h3>
            <div class="price">₹1,999</div>
            <a href="https://wa.me/917360025302?text=Order: Elite Buds E1" class="btn-wa">Order on WhatsApp</a>
        </div>
    </div>
</div>

<footer>
    <p>SHUBH ONLINE STORE &copy; 2026</p>
    <p style="color: #bf953f; margin-top: 10px;">MANAGED BY SACHCHIDANAND</p>
</footer>

</body>
</html>
